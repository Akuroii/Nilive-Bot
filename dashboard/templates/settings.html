{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">

  <div class="card">
    <div class="card-title">🏆 MVP System</div>
    <form method="POST" action="/settings/mvp">
      <div class="form-group">
        <label class="form-label">MVP Role ID</label>
        <input class="form-input" name="mvp_role_id" value="{{ settings.mvp_role_id or '' }}" placeholder="Right click role → Copy ID">
      </div>
      <div class="form-group">
        <label class="form-label">Announce Channel ID</label>
        <input class="form-input" name="mvp_channel_id" value="{{ settings.mvp_channel_id or '' }}" placeholder="Right click channel → Copy ID">
      </div>
      <div class="form-group">
        <label class="form-label">Reset Every</label>
        <select class="form-input" name="reset_hours">
          <option value="24" {% if settings.reset_hours == 24 %}selected{% endif %}>24 hours (daily)</option>
          <option value="12" {% if settings.reset_hours == 12 %}selected{% endif %}>12 hours</option>
          <option value="6" {% if settings.reset_hours == 6 %}selected{% endif %}>6 hours</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
    </form>
  </div>

  <div class="card">
    <div class="card-title">🚀 Boost Roles</div>
    <form method="POST" action="/settings/boost">
      <div class="form-group">
        <label class="form-label">1st Boost Role ID</label>
        <input class="form-input" name="role1_id" value="{{ settings.boost_role1 or '' }}" placeholder="Right click role → Copy ID">
      </div>
      <div class="form-group">
        <label class="form-label">2nd Boost Role ID</label>
        <input class="form-input" name="role2_id" value="{{ settings.boost_role2 or '' }}" placeholder="Right click role → Copy ID">
      </div>
      <div class="form-group">
        <label class="form-label">Boost Announce Channel ID</label>
        <input class="form-input" name="boost_channel_id" value="{{ settings.boost_channel or '' }}" placeholder="Right click channel → Copy ID">
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
    </form>
  </div>

  <div class="card">
    <div class="card-title">⭐ Leveling</div>
    <form method="POST" action="/settings/leveling">
      <div class="form-group">
        <label class="form-label">XP per word</label>
        <input class="form-input" name="xp_per_word" type="number" value="{{ settings.xp_per_word or 2 }}" min="1" max="10">
      </div>
      <div class="form-group">
        <label class="form-label">Max XP per message</label>
        <input class="form-input" name="xp_max" type="number" value="{{ settings.xp_max or 50 }}" min="10" max="500">
      </div>
      <div class="form-group">
        <label class="form-label">Level up channel ID (empty = same channel)</label>
        <input class="form-input" name="levelup_channel" value="{{ settings.levelup_channel or '' }}" placeholder="Leave empty for same channel">
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
    </form>
  </div>

  <div class="card">
    <div class="card-title">🎫 Tickets</div>
    <form method="POST" action="/settings/tickets">
      <div class="form-group">
        <label class="form-label">Staff Role ID</label>
        <input class="form-input" name="staff_role_id" value="{{ settings.staff_role or '' }}" placeholder="Right click role → Copy ID">
      </div>
      <div class="form-group">
        <label class="form-label">Log Channel ID</label>
        <input class="form-input" name="log_channel_id" value="{{ settings.ticket_log or '' }}" placeholder="Right click channel → Copy ID">
      </div>
      <div class="form-group">
        <label class="form-label">Categories (comma separated)</label>
        <input class="form-input" name="categories" value="{{ settings.ticket_categories or 'General Support,Report,Ban Appeal,Other' }}">
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
    </form>
  </div>

  <div class="card">
    <div class="card-title">💰 Economy</div>
    <form method="POST" action="/settings/economy">
      <div class="form-group">
        <label class="form-label">Daily reward min</label>
        <input class="form-input" name="daily_min" type="number" value="{{ settings.daily_min or 100 }}">
      </div>
      <div class="form-group">
        <label class="form-label">Daily reward max</label>
        <input class="form-input" name="daily_max" type="number" value="{{ settings.daily_max or 300 }}">
      </div>
      <div class="form-group">
        <label class="form-label">Work reward min</label>
        <input class="form-input" name="work_min" type="number" value="{{ settings.work_min or 20 }}">
      </div>
      <div class="form-group">
        <label class="form-label">Work reward max</label>
        <input class="form-input" name="work_max" type="number" value="{{ settings.work_max or 80 }}">
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
    </form>
  </div>

  <div class="card">
    <div class="card-title">📢 Welcome Message</div>
    <form method="POST" action="/settings/welcome">
      <div class="form-group">
        <label class="form-label">Welcome Channel ID</label>
        <input class="form-input" name="welcome_channel" value="{{ settings.welcome_channel or '' }}" placeholder="Right click channel → Copy ID">
      </div>
      <div class="form-group">
        <label class="form-label">Welcome Message</label>
        <textarea class="form-input" name="welcome_msg" rows="3" placeholder="Welcome {user} to {server}!">{{ settings.welcome_msg or '' }}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Embed Color</label>
        <input class="form-input" name="welcome_color" value="{{ settings.welcome_color or '#5865F2' }}" placeholder="#5865F2">
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
    </form>
  </div>

</div>
<div id="save-toast" style="display:none;position:fixed;bottom:24px;right:24px;
    background:var(--success);color:#000;padding:12px 20px;border-radius:10px;
    font-weight:500;font-size:14px;z-index:999">
  Settings saved!
</div>
{% if saved %}
<script>
  const toast = document.getElementById('save-toast');
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 3000);
</script>
{% endif %}
{% endblock %}
