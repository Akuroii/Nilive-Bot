<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nero — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
.login-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 400px;
    text-align: center;
}
.logo {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 700; color: #fff;
    margin: 0 auto 24px;
}
h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.subtitle { color: var(--text2); font-size: 13px; margin-bottom: 32px; line-height: 1.6; }
.discord-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #5865F2; color: #fff;
    padding: 13px 24px; border-radius: 10px;
    text-decoration: none; font-weight: 600; font-size: 14px;
    transition: background .15s; width: 100%; margin-bottom: 16px;
}
.discord-btn:hover { background: #4752c4; }
.remember-row {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-bottom: 24px;
}
.remember-row label { font-size: 13px; color: var(--text2); cursor: pointer; }
.footer-note { font-size: 11px; color: var(--text3); margin-top: 20px; }
</style>
</head>
<body>
<div class="login-card">
    <div class="logo">N</div>
    <h1>Nero Dashboard</h1>
    <p class="subtitle">Sign in with your Discord account to manage your server bot settings.</p>

    <div class="remember-row">
        <input type="checkbox" id="remember-me" style="accent-color:var(--accent);width:15px;height:15px;cursor:pointer;">
        <label for="remember-me">Remember me for 7 days</label>
    </div>

    <a href="#" class="discord-btn" id="login-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.054a19.974 19.974 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
        </svg>
        Login with Discord
    </a>

    <p class="footer-note">Only users added to Dashboard Access can log in.</p>
</div>

<script>
document.getElementById('login-btn').addEventListener('click', function(e) {
    e.preventDefault();
    const remember = document.getElementById('remember-me').checked;
    document.cookie = `nero_remember=${remember};path=/;max-age=300`;
    window.location.href = "{{ url_for('discord_login') }}" + (remember ? "?remember=1" : "");
});
const saved = localStorage.getItem('nero-theme');
if (saved) document.documentElement.setAttribute('data-theme', saved);
</script>
</body>
</html>
