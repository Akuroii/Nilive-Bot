<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nero — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg: #0d0d0d; --bg2: #141414; --bg3: #1a1a1a;
            --border: #2a2a2a; --text: #ffffff; --text2: #a0a0a0;
            --accent: #5865F2; --accent2: #4752c4;
        }
        :root[data-theme="light"] {
            --bg: #f0f2f5; --bg2: #ffffff; --bg3: #f8f9fa;
            --border: #dee2e6; --text: #1a1a2e; --text2: #555555;
            --accent: #5865F2; --accent2: #4752c4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg);
            color: var(--text); min-height: 100vh; display: flex;
            align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 16px; padding: 48px 40px; width: 400px;
            text-align: center;
        }
        .logo {
            width: 72px; height: 72px; border-radius: 50%;
            background: var(--accent); display: flex; align-items: center;
            justify-content: center; font-size: 32px; font-weight: 700;
            color: white; margin: 0 auto 24px;
        }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        p { color: var(--text2); font-size: 14px; margin-bottom: 32px; line-height: 1.6; }
        .login-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--accent); color: white; padding: 14px 24px;
            border-radius: 10px; text-decoration: none; font-weight: 600;
            font-size: 15px; transition: background 0.15s; width: 100%;
        }
        .login-btn:hover { background: var(--accent2); }
        .discord-icon { width: 22px; height: 22px; }
        .footer-text { margin-top: 24px; font-size: 12px; color: var(--text2); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">N</div>
        <h1>Nero Dashboard</h1>
        <p>Sign in with your Discord account to manage your server bot settings.</p>
        <a href="/discord_login" class="login-btn">
            <svg class="discord-icon" viewBox="0 0 24 24" fill="white">
                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.054a19.974 19.974 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
            </svg>
            Login with Discord
        </a>
        <p class="footer-text">Only server administrators can access this dashboard.</p>
    </div>
    <script>
        const saved = localStorage.getItem('theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
    </script>
</body>
</html>
