{% extends "base.html" %}
{% block title %}Embed Builder{% endblock %}
{% block content %}

<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;">
    <div>
        <div class="card">
            <div class="card-title">✉️ Build Your Embed</div>
            <div class="form-group">
                <label class="form-label">Title</label>
                <input class="form-input" id="e-title" placeholder="Embed title..." oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea class="form-input" id="e-desc" rows="4"
                    placeholder="Embed description..." oninput="updatePreview()"></textarea>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div class="form-group">
                    <label class="form-label">Color</label>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <input type="color" id="e-color" value="#7c5cbf" oninput="updatePreview()"
                            style="width:42px;height:36px;border-radius:8px;
                                   border:1px solid var(--border);background:transparent;
                                   cursor:pointer;padding:2px;">
                        <input class="form-input" id="e-color-hex" value="#7c5cbf"
                            style="flex:1;" oninput="syncColor(this.value)">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Author</label>
                    <input class="form-input" id="e-author" placeholder="Author name..." oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label class="form-label">Footer</label>
                    <input class="form-input" id="e-footer" placeholder="Footer text..." oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label class="form-label">Thumbnail URL</label>
                    <input class="form-input" id="e-thumbnail" placeholder="https://..." oninput="updatePreview()">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Image URL</label>
                <input class="form-input" id="e-image" placeholder="https://..." oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label class="form-label">Fields</label>
                <div id="fields-container"></div>
                <button class="btn btn-secondary" style="margin-top:8px;font-size:12px;"
                    onclick="addField()">+ Add Field</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">💾 Save / Send</div>
            <div class="form-group">
                <label class="form-label">Save as template</label>
                <input class="form-input" id="save-name" placeholder="e.g. welcome, rules...">
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button class="btn btn-primary" onclick="saveTemplate()">Save Template</button>
                <button class="btn btn-secondary" onclick="copyJSON()">Copy JSON</button>
            </div>
            <div id="embed-status" style="margin-top:10px;font-size:13px;"></div>
        </div>

        <div class="card">
            <div class="card-title">📋 Saved Templates</div>
            <div id="templates-list">
                <span class="text-muted text-sm">Loading...</span>
            </div>
        </div>
    </div>

    <div style="position:sticky;top:80px;">
        <div class="card">
            <div class="card-title">👁️ Live Preview</div>
            <div style="background:#313338;border-radius:8px;padding:16px;">
                <div id="preview-box"
                     style="border-left:4px solid #7c5cbf;background:#2b2d31;
                            border-radius:0 4px 4px 0;padding:12px 16px;position:relative;">
                    <div id="prev-author" style="font-size:12px;color:#b5bac1;margin-bottom:4px;display:none;"></div>
                    <div id="prev-title"  style="font-weight:700;color:#fff;font-size:15px;margin-bottom:4px;display:none;"></div>
                    <div id="prev-desc"   style="color:#dbdee1;font-size:13px;line-height:1.5;display:none;white-space:pre-wrap;"></div>
                    <div id="prev-fields" style="display:grid;gap:8px;margin-top:8px;"></div>
                    <div id="prev-img-container" style="margin-top:10px;display:none;">
                        <img id="prev-img" style="max-width:100%;border-radius:4px;" src="">
                    </div>
                    <div id="prev-footer" style="font-size:12px;color:#b5bac1;margin-top:8px;display:none;"></div>
                    <div id="prev-empty"  style="color:#72767d;font-size:13px;text-align:center;padding:20px 0;">
                        Start typing to see preview...
                    </div>
                    <div id="prev-thumb-container"
                         style="position:absolute;top:12px;right:12px;display:none;">
                        <img id="prev-thumb" style="width:72px;height:72px;border-radius:4px;object-fit:cover;" src="">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% block scripts %}
<script>
function updatePreview() {
    const title     = document.getElementById('e-title').value;
    const desc      = document.getElementById('e-desc').value;
    const color     = document.getElementById('e-color').value;
    const author    = document.getElementById('e-author').value;
    const footer    = document.getElementById('e-footer').value;
    const image     = document.getElementById('e-image').value;
    const thumbnail = document.getElementById('e-thumbnail').value;

    document.getElementById('preview-box').style.borderLeftColor = color;
    document.getElementById('e-color-hex').value = color;

    const hasContent = title || desc || author || footer;
    document.getElementById('prev-empty').style.display = hasContent ? 'none' : 'block';

    setPrev('prev-author', author);
    setPrev('prev-title',  title);
    setPrev('prev-desc',   desc);
    setPrev('prev-footer', footer);

    const imgEl = document.getElementById('prev-img');
    const imgC  = document.getElementById('prev-img-container');
    if (image) { imgEl.src = image; imgC.style.display = 'block'; }
    else imgC.style.display = 'none';

    const thumbEl = document.getElementById('prev-thumb');
    const thumbC  = document.getElementById('prev-thumb-container');
    if (thumbnail) { thumbEl.src = thumbnail; thumbC.style.display = 'block'; }
    else thumbC.style.display = 'none';

    const pf = document.getElementById('prev-fields');
    pf.innerHTML = '';
    document.querySelectorAll('.field-row').forEach(row => {
        const fname   = row.querySelector('.field-name').value;
        const fvalue  = row.querySelector('.field-value').value;
        const finline = row.querySelector('.field-inline').checked;
        if (fname || fvalue) {
            const d = document.createElement('div');
            d.style.cssText = `display:inline-block;${finline ? 'width:45%;margin-right:8px;' : 'width:100%;'}vertical-align:top;`;
            d.innerHTML = `<div style="font-weight:700;color:#fff;font-size:13px;">${fname}</div>
                           <div style="color:#dbdee1;font-size:13px;">${fvalue}</div>`;
            pf.appendChild(d);
        }
    });
}

function setPrev(id, value) {
    const el = document.getElementById(id);
    el.textContent = value;
    el.style.display = value ? 'block' : 'none';
}

function syncColor(hex) {
    if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
        document.getElementById('e-color').value = hex;
        updatePreview();
    }
}

function addField() {
    const div = document.createElement('div');
    div.className = 'field-row';
    div.style.cssText = 'display:grid;grid-template-columns:1fr 1fr auto auto;gap:8px;margin-bottom:8px;align-items:center;';
    div.innerHTML = `
        <input class="form-input field-name" placeholder="Name" oninput="updatePreview()" style="font-size:12px;padding:7px;">
        <input class="form-input field-value" placeholder="Value" oninput="updatePreview()" style="font-size:12px;padding:7px;">
        <label class="form-check" style="white-space:nowrap;font-size:12px;">
            <input type="checkbox" class="field-inline" onchange="updatePreview()"> Inline
        </label>
        <button onclick="this.parentElement.remove();updatePreview()"
            style="background:var(--danger);color:#fff;border:none;border-radius:6px;
                   padding:6px 10px;cursor:pointer;font-size:12px;">✕</button>`;
    document.getElementById('fields-container').appendChild(div);
}

function getEmbedData() {
    const fields = [];
    document.querySelectorAll('.field-row').forEach(row => {
        fields.push({
            name:   row.querySelector('.field-name').value,
            value:  row.querySelector('.field-value').value,
            inline: row.querySelector('.field-inline').checked,
        });
    });
    return {
        title:       document.getElementById('e-title').value,
        description: document.getElementById('e-desc').value,
        color:       document.getElementById('e-color').value,
        author:      document.getElementById('e-author').value,
        footer:      document.getElementById('e-footer').value,
        image:       document.getElementById('e-image').value,
        thumbnail:   document.getElementById('e-thumbnail').value,
        fields,
    };
}

async function saveTemplate() {
    const name = document.getElementById('save-name').value.trim();
    if (!name) { showToast('Enter a template name', 'danger'); return; }
    const res  = await fetch('/api/save-embed-template', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ name, embed: getEmbedData() }),
    });
    const data = await res.json();
    if (data.success) { showToast('Template saved!'); loadTemplates(); }
    else showToast('Error saving', 'danger');
}

function copyJSON() {
    navigator.clipboard.writeText(JSON.stringify(getEmbedData(), null, 2));
    showToast('JSON copied!');
}

async function loadTemplates() {
    const res  = await fetch('/api/embed-templates');
    const data = await res.json();
    const c    = document.getElementById('templates-list');
    if (!data.templates || !data.templates.length) {
        c.innerHTML = '<span class="text-muted text-sm">No saved templates yet.</span>';
        return;
    }
    c.innerHTML = data.templates.map(t => `
        <div style="display:flex;align-items:center;justify-content:space-between;
                    padding:9px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:13px;font-weight:500;">${t}</span>
            <div style="display:flex;gap:6px;">
                <button class="btn btn-sm btn-secondary" onclick="loadTemplate('${t}')">Load</button>
                <button class="btn btn-sm btn-danger" onclick="deleteTemplate('${t}')">Delete</button>
            </div>
        </div>`).join('');
}

async function loadTemplate(name) {
    const res  = await fetch(`/api/embed-template/${name}`);
    const data = await res.json();
    if (!data.template) return;
    const t = data.template;
    document.getElementById('e-title').value     = t.title       || '';
    document.getElementById('e-desc').value      = t.description || '';
    document.getElementById('e-color').value     = t.color       || '#7c5cbf';
    document.getElementById('e-color-hex').value = t.color       || '#7c5cbf';
    document.getElementById('e-author').value    = t.author      || '';
    document.getElementById('e-footer').value    = t.footer      || '';
    document.getElementById('e-image').value     = t.image       || '';
    document.getElementById('e-thumbnail').value = t.thumbnail   || '';
    document.getElementById('fields-container').innerHTML = '';
    (t.fields || []).forEach(f => {
        addField();
        const rows = document.querySelectorAll('.field-row');
        const last = rows[rows.length - 1];
        last.querySelector('.field-name').value   = f.name   || '';
        last.querySelector('.field-value').value  = f.value  || '';
        last.querySelector('.field-inline').checked = f.inline || false;
    });
    updatePreview();
    showToast('Template loaded!');
}

async function deleteTemplate(name) {
    await fetch(`/api/embed-template/${name}`, { method: 'DELETE' });
    loadTemplates();
}

loadTemplates();
updatePreview();
</script>
{% endblock %}
{% endblock %}
