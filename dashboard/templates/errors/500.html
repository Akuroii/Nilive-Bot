<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>500 — Server Error</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">
<style>
body { display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px; }
.code { font-size:80px;font-weight:700;color:var(--danger);line-height:1; }
.msg { font-size:18px;font-weight:600;color:var(--text); }
.sub { font-size:13px;color:var(--text3);text-align:center;max-width:360px;line-height:1.6; }
</style>
</head>
<body>
<div class="code">500</div>
<div class="msg">Internal Server Error</div>
<div class="sub">Something went wrong on our end. Try refreshing the page or come back in a moment.</div>
<a href="/" class="btn btn-primary" style="margin-top:8px;">← Back to Dashboard</a>
<script>const s=localStorage.getItem('nero-theme');if(s)document.documentElement.setAttribute('data-theme',s);</script>
</body>
</html>
